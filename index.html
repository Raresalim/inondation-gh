<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
    <link rel="stylesheet" href="css/L.Control.Locate.min.css">
    <link rel="stylesheet" href="css/qgis2web.css">
    <link rel="stylesheet" href="css/fontawesome-all.min.css">

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        /* ===== Legend Style ===== */
        .legend {
            font-size: 11px;          /* حجم الخط */
            line-height: 16px;        /* تباعد الأسطر */
            color: #555;
            background: #fff;
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            max-width: 140px;         /* يمنع تكبير الصندوق */
        }

        .legend i {
            width: 14px;
            height: 14px;
            float: left;
            margin-right: 6px;
            opacity: 0.7;
        }
    </style>

    <title>Flood Map</title>
</head>

<body>
<div id="map"></div>

<script src="js/qgis2web_expressions.js"></script>
<script src="js/leaflet.js"></script>
<script src="js/L.Control.Layers.Tree.min.js"></script>
<script src="js/L.Control.Locate.min.js"></script>
<script src="js/leaflet-hash.js"></script>
<script src="js/Autolinker.min.js"></script>
<script src="js/rbush.min.js"></script>
<script src="js/labelgun.min.js"></script>
<script src="js/labels.js"></script>

<script src="data/wadi_2.js"></script>

<script>
/* ================= Map ================= */
var map = L.map('map', {
    zoomControl: false,
    minZoom: 1,
    maxZoom: 28
}).fitBounds([[32.443752643478824,3.5689177256500377],
              [32.55140768439127,3.7965253040664284]]);

L.control.zoom({ position: 'topleft' }).addTo(map);
L.control.locate({ locateOptions: { maxZoom: 19 } }).addTo(map);

/* ================= Basemaps ================= */
var googleRoad = L.tileLayer(
    'https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}'
).addTo(map);

var googleSat = L.tileLayer(
    'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}'
);

/* ================= Wadi Layer ================= */
function style_wadi_2() {
    return {
        color: 'rgba(8,131,255,1.0)',
        weight: 1,
        fillOpacity: 0
    };
}

var wadiLayer = L.geoJson(json_wadi_2, {
    style: style_wadi_2,
    interactive: true
}).addTo(map);

/* ================= Flood Raster ================= */
var floodBounds = [
    [32.37165228901085,3.0092579665506722],
    [32.807760862073884,3.8873520774093535]
];

var floodLayer = L.imageOverlay(
    'data/inondation_3.png',
    floodBounds
).addTo(map);

/* ================= Layer Control ================= */
L.control.layers(null, {
    "Inondation": floodLayer,
    "Wadi": wadiLayer,
    "Google Satellite": googleSat,
    "Google Road": googleRoad
}, { collapsed: true }).addTo(map);

/* ================= Legend ================= */
var legend = L.control({ position: 'bottomright' });

legend.onAdd = function () {
    var div = L.DomUtil.create('div', 'legend');

    div.innerHTML = "<b>Profondeur d’inondation (m)</b><br>";

    var grades = [0.0, 4.3, 8.5, 12.8];
    var colors = ['#e6f0fa', '#87cefa', '#4682b4', '#000080'];

    for (var i = 0; i < grades.length; i++) {
        div.innerHTML +=
            '<i style="background:' + colors[i] + '"></i> ' +
            grades[i].toFixed(1) +
            (grades[i + 1] ? ' – ' + grades[i + 1].toFixed(1) + '<br>' : '+');
    }

    return div;
};

legend.addTo(map);
</script>

</body>
</html>
