<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">

<link rel="stylesheet" href="css/leaflet.css">
<link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
<link rel="stylesheet" href="css/L.Control.Locate.min.css">
<link rel="stylesheet" href="css/qgis2web.css">
<link rel="stylesheet" href="css/fontawesome-all.min.css">
<link rel="stylesheet" href="css/leaflet.photon.css">

<style>

html, body, #map {
width: 100%;
height: 100%;
margin: 0;
padding: 0;
}

/* ===== Legend صغير للهاتف ===== */

.legend {
line-height: 14px;
color: #333;
background: white;
padding: 4px 6px;
border-radius: 4px;
box-shadow: 0 0 8px rgba(0,0,0,0.2);
font-size: 10px;
max-width: 140px;
}

.legend i {
width: 12px;
height: 12px;
float: left;
margin-right: 5px;
opacity: 0.9;
}

/* ===== Attribution صغير للهاتف ===== */

.map-credit{
position:absolute;
bottom:3px;
left:5px;
font-size:9px;
color:#444;
background:rgba(255,255,255,0.7);
padding:2px 4px;
border-radius:3px;
z-index:9999;
pointer-events:none;
font-family:sans-serif;
}

</style>
</head>

<body>

<div id="map"></div>

<!-- attribution صغير -->
<div class="map-credit">© Google | Leaflet</div>

<script src="js/leaflet.js"></script>
<script src="js/L.Control.Layers.Tree.min.js"></script>
<script src="js/L.Control.Locate.min.js"></script>
<script src="js/leaflet-hash.js"></script>
<script src="js/Autolinker.min.js"></script>

<script src="data/valle_2.js"></script>

<script>

/* إنشاء الخريطة */

var map = L.map('map',{
zoomControl:false,
maxZoom:28,
minZoom:1
}).fitBounds([[32.477281626209376,3.612827943275947],
[32.53431583756227,3.734998850228754]]);

var hash = new L.Hash(map);

/* حذف Attribution الافتراضي */

map.attributionControl.setPrefix('');
map.attributionControl.remove();

/* أدوات التحكم */

L.control.zoom({position:'topleft'}).addTo(map);
L.control.locate({locateOptions:{maxZoom:19}}).addTo(map);

/* Google Terrain */

map.createPane('pane_GoogleTerrain_0');
map.getPane('pane_GoogleTerrain_0').style.zIndex = 400;

var layer_GoogleTerrain_0 = L.tileLayer(
'https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}',{
pane:'pane_GoogleTerrain_0',
opacity:1,
attribution:'',
minZoom:1,
maxZoom:28
});

map.addLayer(layer_GoogleTerrain_0);

/* Google Satellite */

map.createPane('pane_GoogleSatellite_1');
map.getPane('pane_GoogleSatellite_1').style.zIndex = 401;

var layer_GoogleSatellite_1 = L.tileLayer(
'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{
pane:'pane_GoogleSatellite_1',
opacity:1,
attribution:'',
minZoom:1,
maxZoom:28
});

map.addLayer(layer_GoogleSatellite_1);

/* Style valleys */

function style_valle_2(){
return{
color:'#2893ff',
weight:1,
opacity:1
}
}

/* طبقة الأودية */

map.createPane('pane_valle_2');
map.getPane('pane_valle_2').style.zIndex = 402;

var layer_valle_2 = new L.geoJson(json_valle_2,{
pane:'pane_valle_2',
style:style_valle_2
});

map.addLayer(layer_valle_2);

/* طبقة الفيضان */

map.createPane('pane_inondation_3');
map.getPane('pane_inondation_3').style.zIndex = 403;

var img_inondation_3='data/inondation_3.png';

var img_bounds_inondation_3=[
[32.39375720100701,3.5091501062709876],
[32.60726579369081,3.887391704138747]
];

var layer_inondation_3 = new L.imageOverlay(
img_inondation_3,
img_bounds_inondation_3,
{pane:'pane_inondation_3'}
);

map.addLayer(layer_inondation_3);

/* التحكم في الطبقات */

var overlaysTree=[

{label:"Inondation",layer:layer_inondation_3},

{label:'Vallées',layer:layer_valle_2},

{label:"Google Satellite",layer:layer_GoogleSatellite_1},

{label:"Google Terrain",layer:layer_GoogleTerrain_0}

];

L.control.layers.tree(null,overlaysTree,{collapsed:true}).addTo(map);

/* ===== Legend ===== */

var legend = L.control({position:'bottomright'});

legend.onAdd = function(){

var div = L.DomUtil.create('div','legend');

div.innerHTML='<b>Profondeur d’inondation (m)</b><br>';

var grades=[1,4,5,6,7.90];

var colors=[
'#4292C6',
'#2171B5',
'#08519C',
'#08306B'
];

for (var i=0;i<grades.length-1;i++){

div.innerHTML +=
'<i style="background:'+colors[i]+'"></i> '
+grades[i]+' – '+grades[i+1]+'<br>';

}

return div;

};

legend.addTo(map);

</script>

</body>
</html>
